springdoc.swagger-ui.path=/
springdoc.api-docs.path=/api-docs

spring.application.name=api-gateway
server.port=8083

spring.cloud.gateway.routes[0].id=CourseService
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/course/**

spring.cloud.gateway.routes[1].id=FeeService
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/fee/**

spring.cloud.gateway.routes[2].id=StudentService
spring.cloud.gateway.routes[2].uri=http://localhost:8080
spring.cloud.gateway.routes[2].predicates[0]=Path=/student/**