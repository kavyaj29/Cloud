springdoc.swagger-ui.path=/
springdoc.api-docs.path=/api-docs
server.port=8080
spring.application.name=portal-service

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health

# Resilience4j Circuit Breaker Config for marksService
resilience4j.circuitbreaker.instances.marksService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.marksService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.marksService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.marksService.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.marksService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.marksService.sliding-window-size=10
resilience4j.circuitbreaker.instances.marksService.sliding-window-type=COUNT_BASED

# Resilience4j Circuit Breaker Config for gradeService
resilience4j.circuitbreaker.instances.gradeService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gradeService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.gradeService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.gradeService.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.gradeService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.gradeService.sliding-window-size=10
resilience4j.circuitbreaker.instances.gradeService.sliding-window-type=COUNT_BASED
